<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conjure Viz MCP feature image alternate</title>
  <desc id="desc">A user prompt, an anatomy-style data fetch log, and a trendline chart that draws into existence.</desc>
  <style>
    .mono { font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace; }
    .prompt { font-size: 34px; font-weight: 500; }
    .action { font-size: 25px; font-weight: 500; }
    .detail { font-size: 23px; font-weight: 500; }
  </style>

  <rect width="1200" height="630" fill="#0f1419"/>
  <text x="80" y="136" class="mono prompt" fill="#e6edf3">How's feature adoption trending this month?</text>

  <text x="80" y="212" class="mono action" xml:space="preserve"><tspan fill="#3fb950">● </tspan><tspan fill="#6e7681">Fetching usage telemetry </tspan><tspan fill="#484f58" font-size="20">execute_query</tspan></text>
  <text x="105" y="250" class="mono detail" xml:space="preserve"><tspan fill="#484f58">└ </tspan><tspan fill="#484f58">Loaded feature usage data</tspan></text>

  <g transform="translate(80,314)">
    <text x="0" y="0" class="mono" font-size="25" font-weight="500" xml:space="preserve"><tspan fill="#3fb950">● </tspan><tspan fill="#6e7681">Rendering visual </tspan><tspan fill="#484f58" font-size="20">conjure-viz-mcp</tspan></text>

    <g transform="translate(25,40)">
      <line x1="0" y1="150" x2="560" y2="150" stroke="#26303a" stroke-width="1"/>
      <line x1="0" y1="100" x2="560" y2="100" stroke="#26303a" stroke-width="1"/>
      <line x1="0" y1="50" x2="560" y2="50" stroke="#26303a" stroke-width="1"/>
      <line x1="0" y1="0" x2="560" y2="0" stroke="#26303a" stroke-width="1"/>

      <text x="-12" y="154" class="mono" font-size="12" text-anchor="end" fill="#6e7681">1k</text>
      <text x="-12" y="104" class="mono" font-size="12" text-anchor="end" fill="#6e7681">3k</text>
      <text x="-12" y="54" class="mono" font-size="12" text-anchor="end" fill="#6e7681">5k</text>
      <text x="-12" y="4" class="mono" font-size="12" text-anchor="end" fill="#6e7681">7k</text>

      <polyline fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="0,127 93,120 186,111 280,94 373,72 466,49 560,34" stroke-dasharray="700" stroke-dashoffset="700">
        <animate attributeName="stroke-dashoffset" from="700" to="0" dur="1.1s" begin="0s" fill="freeze"/>
      </polyline>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1" dur="1.2s" begin="0s" fill="freeze"/>
        <circle cx="0" cy="127" r="5" fill="#f59e0b"/>
        <circle cx="93" cy="120" r="5" fill="#f59e0b"/>
        <circle cx="186" cy="111" r="5" fill="#f59e0b"/>
        <circle cx="280" cy="94" r="5" fill="#f59e0b"/>
        <circle cx="373" cy="72" r="5" fill="#f59e0b"/>
        <circle cx="466" cy="49" r="5" fill="#f59e0b"/>
        <circle cx="560" cy="34" r="5" fill="#f59e0b"/>
      </g>

      <text x="0" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Feb 15</text>
      <text x="93" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Feb 22</text>
      <text x="186" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Mar 1</text>
      <text x="280" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Mar 8</text>
      <text x="373" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Mar 15</text>
      <text x="466" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Mar 22</text>
      <text x="560" y="182" class="mono" font-size="12" text-anchor="middle" fill="#6e7681">Mar 29</text>
    </g>
  </g>
</svg>