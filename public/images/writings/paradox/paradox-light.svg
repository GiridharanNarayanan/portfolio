<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
    
    .text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 80px;
      font-weight: 700;
      fill: #1f2328;
    }
    .text-gold {
      font-family: 'JetBrains Mono', monospace;
      font-size: 80px;
      font-weight: 700;
      fill: #8b7320;
    }
    
    @keyframes typeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    .cursor {
      fill: #8b7320;
      opacity: 0;
      animation: blink 0.7s step-end infinite;
      animation-delay: 2.1s;
    }
    
    .p4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 0.0s; }
    .a4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 0.3s; }
    .r4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 0.6s; }
    .a4b { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 0.9s; }
    .d4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 1.2s; }
    .o4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 1.5s; }
    .x4 { opacity: 0; animation: typeIn 0.1s forwards; animation-delay: 1.8s; }
  </style>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#f8f9fa"/>
  
  <!-- Pay (static) -->
  <text x="100" y="178" class="text">Pay</text>
  
  <!-- Per (static) -->
  <text x="100" y="283" class="text">Per</text>
  
  <!-- Person (static) -->
  <text x="100" y="388" class="text">Person</text>
  
  <!-- Paradox (animated) -->
  <text x="100" y="493" class="text-gold p4">P</text>
  <text x="149" y="493" class="text-gold a4">a</text>
  <text x="198" y="493" class="text-gold r4">r</text>
  <text x="247" y="493" class="text-gold a4b">a</text>
  <text x="296" y="493" class="text-gold d4">d</text>
  <text x="345" y="493" class="text-gold o4">o</text>
  <text x="394" y="493" class="text-gold x4">x</text>
  
  <!-- Blinking cursor after Paradox -->
  <rect x="443" y="433" width="6" height="60" class="cursor"/>
</svg>
